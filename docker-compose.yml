version: "3.9"

# StreamSub MVP — docker-compose
#
# Start everything:
#   docker-compose up --build
#
# Real ASR mode:
#   ASR_MODE=real docker-compose up --build
#
# Visit http://localhost:5173 after startup.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # ASR mode: fake (default) | real
      ASR_MODE: ${ASR_MODE:-fake}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE: ${WHISPER_COMPUTE:-int8}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-en}
      TRANSLATE_TARGET: ${TRANSLATE_TARGET:-zh-CN}
      ASR_WINDOW_SECONDS: ${ASR_WINDOW_SECONDS:-2.5}
      FAKE_SUBTITLE_INTERVAL: ${FAKE_SUBTITLE_INTERVAL:-4.0}
    volumes:
      # Cache Whisper models between restarts (only needed for real ASR)
      - whisper-cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      # Prevent host node_modules from overriding container's
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_WS_URL: ws://localhost:8000/ws/subtitles
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  whisper-cache:
